<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#080e1a" />
  <meta name="description" content="Minimal not defteri ve görev hatırlatmaları" />
  <title>Notlarım</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Notlarım" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f0f2f5;
      --surface: #ffffff;
      --surface-dim: #e8eaed;
      --surface-container-low: #f5f6f8;
      --surface-container-high: #e0e3e8;
      --surface-container-highest: #d5d8de;
      --text: #0a1323;
      --text-secondary: #4a5568;
      --muted: #718096;
      --primary: #4edea3;
      --primary-container: #005236;
      --on-primary: #004a31;
      --tertiary: #d4e8c0;
      --outline-variant: rgba(53, 72, 107, 0.15);
      --warn: #ca8a04;
      --accent: #4edea3;
      --accent-fg: #004a31;
    }

    [data-theme="dark"] {
      --bg: #080e1a;
      --surface: #0a1323;
      --surface-dim: #060b15;
      --surface-container-low: #0a1323;
      --surface-container-high: #0f1f3a;
      --surface-container-highest: #102546;
      --text: #dbe5ff;
      --text-secondary: #98abd4;
      --muted: #98abd4;
      --primary: #4edea3;
      --primary-container: #005236;
      --on-primary: #004a31;
      --tertiary: #f4fed3;
      --outline-variant: rgba(53, 72, 107, 0.15);
      --warn: #eab308;
      --accent: #4edea3;
      --accent-fg: #004a31;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      font-size: 15px;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
      padding-bottom: 3rem;
    }

    .app-shell {
      display: flex;
      align-items: stretch;
      min-height: calc(100vh - 3rem);
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 15rem;
      flex-shrink: 0;
      background: var(--surface);
      padding: 1.5rem 0.85rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0;
      overflow-y: auto;
    }

    .sidebar-brand {
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
      padding: 0 0.25rem;
      margin-bottom: 0.2rem;
    }

    .sidebar-profile {
      padding: 0 0.25rem;
      margin-bottom: 1.1rem;
    }

    .sidebar-profile-name {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text);
    }

    .sidebar-profile-sub {
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .sidebar-new-note {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      width: 100%;
      padding: 0.6rem 0;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-container));
      color: var(--on-primary);
      font: inherit;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 1.25rem;
      transition: opacity 0.15s, transform 0.1s;
    }

    .sidebar-new-note:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .sidebar-new-note .plus-icon {
      font-size: 1.1rem;
      line-height: 1;
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
      margin-bottom: 0.5rem;
    }

    .nav-item {
      width: 100%;
      text-align: left;
      padding: 0.55rem 0.65rem;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--text-secondary);
      font: inherit;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.55rem;
      transition: background 0.15s, color 0.15s;
    }

    .nav-item:hover {
      background: var(--surface-container-high);
      color: var(--text);
    }

    .nav-item.active {
      color: var(--primary);
      font-weight: 600;
    }

    .nav-item .nav-icon {
      font-size: 0.95rem;
      width: 1.2rem;
      text-align: center;
      flex-shrink: 0;
    }

    .nav-item .nav-label {
      flex: 1;
      min-width: 0;
    }

    .nav-item .nav-count {
      font-size: 0.65rem;
      color: var(--muted);
      font-weight: 500;
    }

    /* Klasor navigasyonu */
    .sidebar-section-label {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      padding: 0.6rem 0.65rem 0.25rem;
    }

    .folder-nav {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .folder-row {
      width: 100%;
      text-align: left;
      padding: 0.4rem 0.65rem 0.4rem 1.8rem;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--text-secondary);
      font: inherit;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.35rem;
      transition: background 0.15s, color 0.15s;
    }

    .folder-row:hover {
      background: var(--surface-container-high);
      color: var(--text);
    }

    .folder-row.active {
      color: var(--text);
      font-weight: 600;
    }

    .folder-row .fc {
      font-size: 0.62rem;
      color: var(--muted);
      font-weight: 500;
    }

    .folder-sep {
      display: none;
    }

    .sidebar-add {
      display: flex;
      gap: 0.25rem;
      padding: 0.35rem 0.65rem 0.35rem 1.8rem;
    }

    .sidebar-add input {
      flex: 1;
      min-width: 0;
      padding: 0.35rem 0.45rem;
      border: none;
      border-radius: 6px;
      background: var(--surface-container-high);
      color: var(--text);
      font: inherit;
      font-size: 0.72rem;
    }

    .sidebar-add input:focus {
      outline: none;
      box-shadow: 0 0 0 2px rgba(78, 222, 163, 0.25);
    }

    .sidebar-add .btn-ghost {
      padding: 0.35rem 0.5rem;
      font-size: 0.7rem;
    }

    .folder-item {
      display: block;
    }

    .folder-item-head {
      display: flex;
      align-items: center;
      gap: 0.1rem;
    }

    .folder-item-head .folder-row {
      flex: 1;
      min-width: 0;
    }

    .folder-row .arrow {
      font-size: 0.5rem;
      opacity: 0.5;
      transition: transform 0.15s;
    }

    .folder-row.active .arrow {
      transform: rotate(90deg);
    }

    /* Sidebar alt bolum */
    .sidebar-bottom {
      margin-top: auto;
      padding-top: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }

    .sidebar-bottom .nav-item {
      color: var(--muted);
      font-size: 0.8rem;
    }

    .sidebar-bottom .nav-item:hover {
      color: var(--text);
    }

    /* ── Klasor alti not listesi ── */
    .folder-note-list {
      width: 100%;
      list-style: none;
      margin: 0;
      padding: 0.1rem 0 0.15rem 2.4rem;
    }

    .folder-note-item {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.3rem 0.4rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.72rem;
      border-left: 2px solid transparent;
      transition: background 0.15s;
    }

    .folder-note-item:hover {
      background: var(--surface-container-high);
    }

    .folder-note-item.selected {
      background: var(--surface-container-high);
      border-left-color: var(--primary);
    }

    .folder-note-grip {
      cursor: grab;
      color: var(--muted);
      font-size: 0.5rem;
      opacity: 0.3;
      user-select: none;
      flex-shrink: 0;
    }

    .folder-note-grip:active {
      cursor: grabbing;
    }

    .folder-note-info {
      flex: 1;
      min-width: 0;
      overflow: hidden;
    }

    .folder-note-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
      font-size: 0.72rem;
    }

    .folder-note-date {
      font-size: 0.58rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .folder-note-item.drag-over {
      border-top: 2px solid var(--primary);
    }

    /* ── Shopping page ── */
    .shop-page { display: none; padding: 1.5rem; }
    .shop-page.active { display: block; }

    .shop-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .shop-budget-wrap {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .shop-budget-label {
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .shop-budget-input {
      width: 7rem;
      padding: 0.45rem 0.6rem;
      border: 1px solid var(--outline-variant);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font: inherit;
      font-size: 0.85rem;
      text-align: right;
    }

    .shop-budget-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(78,222,163,0.2);
    }

    .shop-total-wrap {
      display: flex;
      align-items: baseline;
      gap: 0.4rem;
    }

    .shop-total-label {
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .shop-total-value {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text);
    }

    .shop-total-value.over-budget {
      color: #ef4444;
    }

    .shop-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .shop-item {
      background: var(--surface);
      border-radius: 10px;
      padding: 0.75rem 0.85rem;
      transition: background 0.15s;
    }

    .shop-item.checked {
      opacity: 0.5;
    }

    .shop-item-main {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .shop-item-check {
      width: 1.2rem;
      height: 1.2rem;
      border: 2px solid var(--muted);
      border-radius: 50%;
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      padding: 0;
      transition: all 0.15s;
    }

    .shop-item-check.done {
      background: var(--primary);
      border-color: var(--primary);
    }

    .shop-item-name {
      flex: 1;
      min-width: 0;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text);
      border: none;
      background: transparent;
      font: inherit;
      padding: 0.2rem 0;
    }

    .shop-item-name:focus { outline: none; }

    .shop-item-price {
      width: 5.5rem;
      padding: 0.3rem 0.5rem;
      border: 1px solid var(--outline-variant);
      border-radius: 6px;
      background: var(--surface-container-high);
      color: var(--text);
      font: inherit;
      font-size: 0.82rem;
      text-align: right;
    }

    .shop-item-price:focus {
      outline: none;
      border-color: var(--primary);
    }

    .shop-item-expand {
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0.2rem;
      transition: transform 0.2s, color 0.15s;
      flex-shrink: 0;
    }

    .shop-item-expand:hover { color: var(--text); }
    .shop-item-expand.open { transform: rotate(90deg); }

    .shop-item-del {
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 0.2rem;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    .shop-item:hover .shop-item-del { opacity: 1; }
    .shop-item-del:hover { color: #ef4444; }

    .shop-item-details {
      display: none;
      margin-top: 0.6rem;
      padding-left: 1.8rem;
      gap: 0.5rem;
    }

    .shop-item-details.open {
      display: flex;
      flex-direction: column;
    }

    .shop-detail-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .shop-detail-label {
      font-size: 0.7rem;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      width: 4.5rem;
      flex-shrink: 0;
    }

    .shop-detail-input {
      flex: 1;
      padding: 0.35rem 0.55rem;
      border: 1px solid var(--outline-variant);
      border-radius: 6px;
      background: var(--surface-container-high);
      color: var(--text);
      font: inherit;
      font-size: 0.8rem;
    }

    .shop-detail-input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .shop-fab {
      position: fixed;
      bottom: 5rem;
      right: 1.5rem;
      width: 3rem;
      height: 3rem;
      border-radius: 50%;
      border: none;
      background: var(--primary);
      color: var(--accent-fg);
      font-size: 1.5rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 90;
      transition: transform 0.15s;
    }

    .shop-fab:hover { transform: scale(1.1); }
    .shop-fab.visible { display: flex; }

    .shop-empty {
      text-align: center;
      color: var(--muted);
      padding: 3rem 1rem;
      font-size: 0.9rem;
    }

    .folder-row.drop-target {
      background: var(--primary-container);
      color: var(--primary);
      outline: 2px dashed var(--primary);
      outline-offset: -2px;
    }

    .folder-del {
      flex-shrink: 0;
      width: 1.4rem;
      height: 1.4rem;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.8rem;
      line-height: 1;
      transition: background 0.15s, color 0.15s;
      opacity: 0;
    }

    .folder-item-head:hover .folder-del {
      opacity: 1;
    }

    .folder-del:hover {
      color: var(--text);
      background: var(--surface-container-high);
    }

    /* ── Top header bar ── */
    .top-header {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.5rem;
      padding: 0.85rem 1.5rem;
      background: transparent;
    }

    .top-header .search-bar {
      width: 18rem;
      padding: 0.55rem 0.85rem 0.55rem 2.2rem;
      border: none;
      border-radius: 10px;
      background: var(--surface-container-high);
      color: var(--text);
      font: inherit;
      font-size: 0.82rem;
      position: relative;
    }

    .top-header .search-bar:focus {
      outline: none;
      box-shadow: 0 0 0 2px rgba(78, 222, 163, 0.25);
    }

    .top-header .search-bar::placeholder {
      color: var(--muted);
    }

    .search-wrapper {
      position: relative;
    }

    .search-wrapper .search-icon {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.8rem;
      pointer-events: none;
    }

    .main-area {
      flex: 1;
      min-width: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }

    .main-content {
      flex: 1;
      overflow-y: auto;
    }

    @media (max-width: 640px) {
      body {
        font-size: 16px;
        padding-bottom: 4.5rem;
      }

      .app-shell {
        flex-direction: column;
        min-height: auto;
      }

      .sidebar {
        width: 100%;
        padding: 0.75rem;
      }

      .sidebar-brand {
        font-size: 0.95rem;
      }

      .sidebar-profile {
        margin-bottom: 0.75rem;
      }

      .sidebar-new-note {
        margin-bottom: 0.75rem;
        padding: 0.55rem;
      }

      .sidebar-nav {
        margin-bottom: 0.35rem;
      }

      .nav-item {
        padding: 0.5rem 0.55rem;
        font-size: 0.85rem;
      }

      .folder-nav {
        max-height: 35vh;
        overflow-y: auto;
      }

      .folder-row {
        padding: 0.45rem 0.55rem 0.45rem 1.4rem;
        font-size: 0.82rem;
      }

      .folder-note-list {
        padding-left: 1.6rem;
      }

      .folder-note-item {
        padding: 0.4rem 0.4rem;
        font-size: 0.78rem;
      }

      .folder-note-title {
        font-size: 0.78rem;
      }

      .folder-note-date {
        font-size: 0.62rem;
      }

      .sidebar-add {
        padding: 0.35rem 0.55rem 0.35rem 1.4rem;
      }

      .sidebar-add input {
        padding: 0.4rem;
        font-size: 0.78rem;
      }

      .sidebar-add .btn-ghost {
        padding: 0.4rem 0.5rem;
        font-size: 0.78rem;
      }

      .sidebar-bottom {
        padding-top: 0.5rem;
      }

      .top-header {
        padding: 0.6rem 0.85rem;
      }

      .top-header .search-bar {
        width: 12rem;
      }

      .wrap {
        padding: 0.5rem 0.85rem 2rem;
      }

      .top {
        margin-bottom: 0.75rem;
      }

      .top h1 {
        font-size: 1.15rem;
      }

      .icon-btn {
        width: 2.5rem;
        height: 2.5rem;
        font-size: 0.95rem;
      }

      .search {
        padding: 0.6rem 0.7rem;
        font-size: 0.95rem;
        margin-bottom: 0.6rem;
      }

      li.note {
        padding: 1rem;
        gap: 0.6rem;
      }

      .note-title-line {
        font-size: 1.05rem;
      }

      .note-subline {
        font-size: 0.85rem;
        margin-top: 0.25rem;
      }

      .note-time {
        font-size: 0.75rem;
      }

      .note-actions {
        gap: 0.15rem;
        margin-top: 0.4rem;
      }

      .note-actions button {
        font-size: 0.8rem;
        padding: 0.35rem 0.5rem;
      }

      .note-color-bar {
        width: 5px;
      }

      .note-editor textarea {
        min-height: 10rem;
        font-size: 0.95rem;
      }

      .note-compose textarea {
        min-height: 8rem;
        font-size: 0.95rem;
      }

      .note-compose .note-title-input,
      .note-editor .note-title-input {
        font-size: 0.95rem;
        padding: 0.6rem 0.7rem;
      }

      .note-folder-select {
        font-size: 0.9rem;
        padding: 0.5rem 0.6rem;
      }

      .color-dot {
        width: 1.7rem;
        height: 1.7rem;
      }

      .color-picker {
        gap: 0.45rem;
      }

      .fab {
        bottom: 5rem;
        right: 1rem;
        width: 3.8rem;
        height: 3.8rem;
        font-size: 2.2rem;
      }

      .note-modal {
        width: calc(100vw - 1.5rem);
        max-height: calc(100vh - 2rem);
        padding: 1.2rem;
        border-radius: 12px;
      }

      .note-modal-head h2 {
        font-size: 1.05rem;
      }

      .tasks-dock {
        width: min(22rem, calc(100vw - 1rem));
        right: 0.5rem;
      }

      .tasks-dock > summary {
        padding: 0.6rem 0.75rem;
        font-size: 0.85rem;
      }

      .dock-body {
        font-size: 0.9rem;
      }

      .dock-body .row input[type="text"] {
        font-size: 0.9rem;
        padding: 0.45rem 0.55rem;
      }

      .dock-body .btn {
        font-size: 0.85rem;
        padding: 0.45rem 0.65rem;
      }

      .btn {
        padding: 0.55rem 0.9rem;
        font-size: 0.95rem;
      }

      .btn-ghost {
        padding: 0.4rem 0.6rem;
        font-size: 0.85rem;
      }

      .empty {
        font-size: 0.95rem;
        padding: 2.5rem 1rem;
      }

      .note-remind-grid input,
      .note-remind-grid select,
      .grid input,
      .grid select,
      .grid textarea {
        font-size: 0.85rem;
        padding: 0.4rem 0.45rem;
      }

      .shop-page { padding: 0.75rem; }
      .shop-header { gap: 0.5rem; }
      .shop-budget-input { width: 5.5rem; font-size: 0.8rem; }

    /* ── Not renk sistemi ── */

    .color-picker-label {

      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0.25rem;
      font-weight: 600;
    }

    .color-dot {
      width: 1.4rem;
      height: 1.4rem;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
      position: relative;
    }

    .color-dot:hover {
      transform: scale(1.15);
    }

    .color-dot.active {
      border-color: var(--text);
    }

    .color-dot.active::after {
      content: "\2713";
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      color: #fff;
      font-weight: 700;
    }

    .color-dot[data-color=""] { background: var(--surface-container-highest); }
    .color-dot[data-color=""].active::after { color: var(--text); }
    .color-dot[data-color="red"] { background: #ef4444; }
    .color-dot[data-color="orange"] { background: #f97316; }
    .color-dot[data-color="yellow"] { background: #eab308; }
    .color-dot[data-color="green"] { background: #22c55e; }
    .color-dot[data-color="blue"] { background: #3b82f6; }
    .color-dot[data-color="purple"] { background: #a855f7; }
    .color-dot[data-color="pink"] { background: #ec4899; }

    /* ── FAB butonu ── */
    .fab {
      position: fixed;

      height: 3.5rem;
      border-radius: 50%;

      font-size: 2rem;
      line-height: 1;

      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s;

    .fab:hover {

    /* ── Not modal penceresi ── */
    .note-modal-overlay {
      position: fixed;
      z-index: 90;
      inset: 0;
      background: rgba(8, 14, 26, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;

      pointer-events: none;

      padding: 1.75rem;
      box-shadow: 0 20px 40px rgba(21, 32, 49, 0.4);
      transform: translateY(1rem);
      transition: transform 0.25s;

  <script>
    window.onerror = function(msg, url, line) {
      document.title = "HATA L" + line + ": " + msg;
      var d = document.createElement("div");
      d.style.cssText = "position:fixed;top:0;left:0;right:0;background:red;color:#fff;padding:8px;z-index:9999;font-size:13px";
      d.textContent = "JS Hata (satır " + line + "): " + msg;
      document.body.appendChild(d);
    };
    const STORAGE_KEY = "notlar-app-v4";
    const LEGACY_TASKS = "gorevlerim-v3";
    const LEGACY_V2 = "gorevlerim-v2";
    const LEGACY_V1 = "gorevlerim-v1";
    const THEME_KEY = "gorevlerim-theme";

    const CAT_LABEL = { "": "Genel", is: "İş", kisisel: "Kişisel", saglik: "Sağlık" };
    const REMINDER_LABELS = { 0: "Tam vakitte", 15: "15 dk önce", 60: "1 saat önce", 1440: "1 gün önce" };
    const REPEAT_LABELS = { daily: "Günlük", weekly: "Haftalık", monthly: "Aylık" };

    const $ = (id) => document.getElementById(id);

    let notes = [];
    let folders = [];
    let selectedFolderView = "all";
    let expandedFolders = new Set();
    let selectedNoteId = null;
    let tasks = [];
    let taskFilter = "all";
    let editingTaskId = null;
    let editingNoteId = null;
    let dragId = null;
    let dragNoteId = null;

    const noteForm = $("noteForm");
    const noteTitleInput = $("noteTitle");
    const noteBody = $("noteBody");
    const noteDueDateEl = $("noteDueDate");
    const noteDueTimeEl = $("noteDueTime");
    const noteReminderOffsetEl = $("noteReminderOffset");
    const noteRemindDetails = $("noteRemindDetails");
    const noteFolderSelect = $("noteFolderSelect");
    const noteList = $("noteList");
    const noteEmpty = $("noteEmpty");
    const folderList = $("folderList");
    const folderNav = $("folderNav");
    const newFolderName = $("newFolderName");
    const addFolderBtn = $("addFolderBtn");
    const countAllEl = $("countAll");
    const countNoneEl = $("countNone");

    const taskForm = $("taskForm");
    const taskInput = $("taskInput");
    const dueDateEl = $("dueDate");
    const dueTimeEl = $("dueTime");
    const reminderOffsetEl = $("reminderOffset");
    const categoryEl = $("category");
    const priorityEl = $("priority");
    const repeatEl = $("repeat");
    const taskNotesEl = $("taskNotes");
    const taskSearch = $("taskSearch");
    const taskList = $("taskList");
    const taskEmpty = $("taskEmpty");
    const taskCount = $("taskCount");
    const clearDone = $("clearDone");
    const filterPills = document.querySelectorAll("[data-filter]");
    const catFilter = $("catFilter");
    const sortByEl = $("sortBy");
    const themeBtn = $("themeBtn");
    const notifBtn = $("notifBtn");
    const exportBtn = $("exportBtn");
    const importBtn = $("importBtn");
    const importInput = $("importInput");
    const dockBadge = $("dockBadge");
    const tasksDock = $("tasksDock");
    const noteModalOverlay = $("noteModalOverlay");
    const noteModalClose = $("noteModalClose");
    const noteModalCancelBtn = $("noteModalCancelBtn");
    const fabBtn = $("fabBtn");
    const noteSearchEl = $("noteSearch");
    const generalFolderWrap = $("generalFolderWrap");
    const noteColorPicker = $("noteColorPicker");
    const sidebarNewNote = $("sidebarNewNote");
    const navAll = $("navAll");
    const navFavorites = $("navFavorites");
    const navFolders = $("navFolders");
    const navShopping = $("navShopping");
    const shopPage = $("shopPage");
    const shopListEl = $("shopList");
    const shopTotalEl = $("shopTotal");
    const shopBudgetEl = $("shopBudget");
    const shopEmpty = $("shopEmpty");
    const shopFab = $("shopFab");
    let selectedNoteColor = "";
    let foldersExpanded = false;
    let shoppingItems = [];
    let shoppingBudget = "";
    let currentView = "notes"; // "notes" or "shopping"

    function openNoteModal() {
      noteModalOverlay.classList.add("visible");
      fabBtn.classList.add("open");
      setTimeout(() => noteTitleInput.focus(), 100);
    }

    function closeNoteModal() {
      noteModalOverlay.classList.remove("visible");
      fabBtn.classList.remove("open");
    }

    function normalizeFolder(f) {
      return {
        id: f.id,
        name: String(f.name || "").trim().slice(0, 40) || "Klasör",
      };
    }

    function normalizeNote(n) {
      const ro = n.reminderOffset;
      let rOff = ro === undefined || ro === null || ro === "" ? null : Number(ro);
      if (rOff !== null && Number.isNaN(rOff)) rOff = null;
      let folderId = n.folderId || null;
      if (folderId && !folders.some((x) => x.id === folderId)) folderId = null;
      return {
        id: n.id,
        title: String(n.title || "").trim().slice(0, 200),
        body: String(n.body || "").slice(0, 50000),
        updatedAt: typeof n.updatedAt === "number" ? n.updatedAt : Date.now(),
        pinned: !!n.pinned,
        folderId,
        dueDate: n.dueDate || null,
        dueTime: n.dueTime || null,
        reminderOffset: rOff,
        reminderFiredFor: n.reminderFiredFor ?? null,
        snoozeUntil: n.snoozeUntil != null ? Number(n.snoozeUntil) : null,
        color: n.color || "",
      };
    }

    function normalizeTask(t) {
      const pr = Number(t.priority);
      return {
        id: t.id,
        text: String(t.text || ""),
        done: !!t.done,
        dueDate: t.dueDate || null,
        dueTime: t.dueTime || null,
        reminderOffset:
          t.reminderOffset === undefined || t.reminderOffset === null || t.reminderOffset === ""
            ? null
            : Number(t.reminderOffset),
        reminderFiredFor: t.reminderFiredFor ?? null,
        category: t.category || "",
        priority: pr >= 1 && pr <= 3 ? pr : 2,
        notes: String(t.notes || "").slice(0, 2000),
        repeat: t.repeat && ["daily", "weekly", "monthly"].includes(t.repeat) ? t.repeat : null,
        snoozeUntil: t.snoozeUntil != null ? Number(t.snoozeUntil) : null,
      };
    }

    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const d = JSON.parse(raw);
          if (d && Array.isArray(d.notes) && Array.isArray(d.tasks)) {
            folders = Array.isArray(d.folders) ? d.folders.map(normalizeFolder) : [];
            notes = d.notes.map(normalizeNote);
            tasks = d.tasks.map(normalizeTask);
            shoppingItems = Array.isArray(d.shoppingItems) ? d.shoppingItems : [];
            shoppingBudget = d.shoppingBudget || "";
            persist();
            return;
          }
        }
        let legacy = localStorage.getItem(LEGACY_TASKS) || localStorage.getItem(LEGACY_V2) || localStorage.getItem(LEGACY_V1);
        if (legacy) {
          const arr = JSON.parse(legacy);
          tasks = Array.isArray(arr) ? arr.map(normalizeTask) : [];
        } else {
          tasks = [];
        }
        notes = [];
        folders = [];
        persist();
      } catch(e) {
        notes = [];
        folders = [];
        tasks = [];
      }
    }

    function persist() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ notes, tasks, folders, shoppingItems, shoppingBudget }));
      [LEGACY_TASKS, LEGACY_V2, LEGACY_V1].forEach((k) => localStorage.removeItem(k));
    }

    function uid() {
      return crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random();
    }

    function todayISO() {
      const d = new Date();
      const z = (n) => String(n).padStart(2, "0");
      return `${d.getFullYear()}-${z(d.getMonth() + 1)}-${z(d.getDate())}`;
    }

    function nextDueDate(iso, mode) {
      let y;
      let m;
      let d;
      if (iso && /^\d{4}-\d{2}-\d{2}$/.test(iso)) {
        const p = iso.split("-").map(Number);
        y = p[0];
        m = p[1] - 1;
        d = p[2];
      } else {
        const n = new Date();
        y = n.getFullYear();
        m = n.getMonth();
        d = n.getDate();
      }
      const dt = new Date(y, m, d);
      if (mode === "daily") dt.setDate(dt.getDate() + 1);
      if (mode === "weekly") dt.setDate(dt.getDate() + 7);
      if (mode === "monthly") dt.setMonth(dt.getMonth() + 1);
      const z = (n) => String(n).padStart(2, "0");
      return `${dt.getFullYear()}-${z(dt.getMonth() + 1)}-${z(dt.getDate())}`;
    }

    function getDueMs(t) {
      if (!t.dueDate) return null;
      const time = t.dueTime && t.dueTime.length ? t.dueTime : "09:00";
      const ms = new Date(`${t.dueDate}T${time}:00`).getTime();
      return Number.isNaN(ms) ? null : ms;
    }

    function getReminderFireMs(t) {
      if (t.reminderOffset === null || t.dueDate == null) return null;
      const due = getDueMs(t);
      if (due === null) return null;
      const off = Number(t.reminderOffset);
      if (Number.isNaN(off)) return null;
      return due - off * 60 * 1000;
    }

    function formatDateTr(iso) {
      if (!iso) return "";
      const [y, mo, d] = iso.split("-").map(Number);
      return new Date(y, mo - 1, d).toLocaleDateString("tr-TR", {
        day: "numeric",
        month: "short",
      });
    }

    function formatNoteTime(ts) {
      return new Date(ts).toLocaleString("tr-TR", {
        day: "numeric",
        month: "short",
        hour: "2-digit",
        minute: "2-digit",
      });
    }

    function isOverdue(t) {
      if (t.done || !t.dueDate) return false;
      const due = getDueMs(t);
      return due !== null && Date.now() > due;
    }

    function isNoteOverdue(n) {
      if (!n.dueDate) return false;
      const due = getDueMs(n);
      return due !== null && Date.now() > due;
    }

    function notePreview(body) {
      const line = body.trim().split("\n")[0] || "Başlıksız";
      return line.length > 120 ? line.slice(0, 120) + "\u2026" : line;
    }

    function noteListTitle(n) {
      return n.title.trim() || notePreview(n.body);
    }

    function noteListSubtitle(n) {
      if (!n.title.trim()) return "";
      const line = n.body.trim().replace(/\s+/g, " ");
      if (!line) return "";
      return line.length > 100 ? line.slice(0, 100) + "\u2026" : line;
    }

    function describeNoteReminder(n) {
      if (n.reminderOffset === null || !n.dueDate) return [];
      const parts = [
        formatDateTr(n.dueDate),
        n.dueTime || "09:00",
        REMINDER_LABELS[n.reminderOffset] || "",
      ].filter(Boolean);
      if (n.snoozeUntil && Date.now() < n.snoozeUntil) {
        parts.push(
          `ertelendi ${new Date(n.snoozeUntil).toLocaleTimeString("tr-TR", { hour: "2-digit", minute: "2-digit" })}`
        );
      }
      return parts;
    }

    function matchesTaskSearch(t, q) {
      if (!q) return true;
      const s = q.toLowerCase();
      return t.text.toLowerCase().includes(s) || (t.notes && t.notes.toLowerCase().includes(s));
    }

    function matchesCat(t) {
      const cf = catFilter.value;
      if (!cf) return true;
      if (cf === "__other") return !t.category;
      return t.category === cf;
    }

    function baseFilteredTasks() {
      let v = tasks.filter(matchesCat).filter((t) => matchesTaskSearch(t, taskSearch.value.trim()));
      if (taskFilter === "active") v = v.filter((t) => !t.done);
      if (taskFilter === "done") v = v.filter((t) => t.done);
      return v;
    }

    function sortTasks(arr) {
      const mode = sortByEl.value;
      const ix = (id) => tasks.findIndex((x) => x.id === id);
      if (mode === "custom") {
        return [...arr].sort((a, b) => ix(a.id) - ix(b.id));
      }
      if (mode === "priority") {
        return [...arr].sort((a, b) => {
          if (a.priority !== b.priority) return a.priority - b.priority;
          const da = getDueMs(a);
          const db = getDueMs(b);
          if (da === null && db === null) return ix(a.id) - ix(b.id);
          if (da === null) return 1;
          if (db === null) return -1;
          return da - db;
        });
      }
      return [...arr].sort((a, b) => {
        const da = getDueMs(a);
        const db = getDueMs(b);
        if (da === null && db === null) return ix(a.id) - ix(b.id);
        if (da === null) return 1;
        if (db === null) return -1;
        if (da !== db) return da - db;
        if (a.priority !== b.priority) return a.priority - b.priority;
        return ix(a.id) - ix(b.id);
      });
    }

    function visibleTasks() {
      return sortTasks(baseFilteredTasks());
    }

    function reorderFromDrag(dragId, targetId) {
      const vis = visibleTasks();
      const ids = vis.map((t) => t.id);
      const fi = ids.indexOf(dragId);
      const ti = ids.indexOf(targetId);
      if (fi < 0 || ti < 0 || fi === ti) return;
      const next = [...ids];
      next.splice(fi, 1);
      next.splice(ti, 0, dragId);
      const visSet = new Set(next);
      const firstIdx = tasks.findIndex((t) => visSet.has(t.id));
      if (firstIdx < 0) return;
      const map = Object.fromEntries(tasks.map((t) => [t.id, t]));
      const before = tasks.filter((t, i) => i < firstIdx && !visSet.has(t.id));
      const after = tasks.filter((t, i) => i >= firstIdx && !visSet.has(t.id));
      tasks = [...before, ...next.map((id) => map[id]), ...after];
      sortByEl.value = "custom";
      persist();
    }

    function sortedNotesFiltered() {
      const q = noteSearchEl ? noteSearchEl.value.trim().toLowerCase() : "";
      const list = notes.filter((n) => {
        if (selectedFolderView === "all") { /* pass */ }
        else if (selectedFolderView === "pinned") { if (!n.pinned) return false; }
        else if (selectedFolderView === "none") { if (n.folderId) return false; }
        else { if (n.folderId !== selectedFolderView) return false; }
        if (q) {
          const t = (n.title + " " + n.body).toLowerCase();
          if (!t.includes(q)) return false;
        }
        return true;
      });
      return list.sort((a, b) => {
        if (a.pinned !== b.pinned) return a.pinned ? -1 : 1;
        return b.updatedAt - a.updatedAt;
      });
    }

    function reorderNote(draggedId, targetId, folderId) {
      const folderNotes = notes.filter((n) => (n.folderId || null) === folderId);
      const ids = folderNotes.map((n) => n.id);
      const fi = ids.indexOf(draggedId);
      const ti = ids.indexOf(targetId);
      if (fi < 0 || ti < 0 || fi === ti) return;
      ids.splice(fi, 1);
      ids.splice(ti, 0, draggedId);
      const idSet = new Set(ids);
      const map = Object.fromEntries(notes.map((n) => [n.id, n]));
      const reordered = ids.map((id) => map[id]);
      const result = [];
      let ri = 0;
      for (let i = 0; i < notes.length; i++) {
        if (idSet.has(notes[i].id)) {
          result.push(reordered[ri++]);
        } else {
          result.push(notes[i]);
        }
      }
      notes = result;
      persist();
    }

        li.addEventListener("drop", (e) => {

    }

    function applyTheme() {
      const t = localStorage.getItem(THEME_KEY);
      const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      const dark = t === "dark" || (!t && prefersDark);
      document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
      updateThemeMeta();
    }

    function updateTitle() {
      const od =
        tasks.filter((t) => !t.done && isOverdue(t)).length +
        notes.filter(isNoteOverdue).length;
      const active = tasks.filter((t) => !t.done).length;
      if (od) document.title = `(${od}) Notlarım`;
      else if (active) document.title = `${active} görev \u00B7 Notlarım`;
      else document.title = "Notlarım";
    }

    function updateDockBadge() {
      const active = tasks.filter((t) => !t.done).length;
      const od = tasks.filter((t) => !t.done && isOverdue(t)).length;
      dockBadge.textContent = String(active);
      dockBadge.classList.toggle("warn", od > 0);
    }

    function playBeep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g);
        g.connect(ctx.destination);
        o.frequency.value = 880;
        g.gain.value = 0.04;
        o.start();
        setTimeout(() => {
          o.stop();
          ctx.close();
        }, 120);
      } catch (_) {}
    }

    function updateNotifBtn() {
      if (!("Notification" in window)) {
        notifBtn.hidden = true;
        return;
      }
      notifBtn.hidden = false;
      if (Notification.permission === "granted") notifBtn.textContent = "\u2713";
      else if (Notification.permission === "denied") notifBtn.textContent = "\u2715";
      else notifBtn.textContent = "\uD83D\uDD14";
      notifBtn.title =
        Notification.permission === "granted"
          ? "Bildirimler açık"
          : Notification.permission === "denied"
            ? "Bildirim engelli"
            : "Bildirime izin ver";
    }

    function fireReminder(item, fireMs, notifTitle, notifBody, tagPrefix) {
      if (!("Notification" in window) || Notification.permission !== "granted") return;
      if (item.snoozeUntil && Date.now() < item.snoozeUntil) return;
      const key = String(fireMs);
      if (item.reminderFiredFor === key) return;
      new Notification(notifTitle, {
        body: notifBody,
        tag: tagPrefix + item.id,
      });
      playBeep();
      item.reminderFiredFor = key;
      persist();
    }

    function tryNotify(t, fireMs) {
      if (t.done) return;
      const when = t.dueDate ? formatDateTr(t.dueDate) : "";
      const timeBit = t.dueTime ? ` ${t.dueTime}` : "";
      fireReminder(
        t,
        fireMs,
        "Hatırlatma",
        `${t.text}${when ? ` \u2014 ${when}${timeBit}` : ""}`,
        "task-"
      );
    }

    function tryNotifyNote(n, fireMs) {
      const when = n.dueDate ? formatDateTr(n.dueDate) : "";
      const timeBit = n.dueTime ? ` ${n.dueTime}` : "";
      const line = noteListTitle(n);
      fireReminder(
        n,
        fireMs,
        "Not hatırlatması",
        `${line}${when ? ` \u2014 ${when}${timeBit}` : ""}`,
        "note-"
      );
    }

    function checkReminders() {
      const now = Date.now();
      for (const t of tasks) {
        if (t.done) continue;
        const fire = getReminderFireMs(t);
        if (fire === null) continue;
        if (t.snoozeUntil && now < t.snoozeUntil) continue;
        if (now >= fire) tryNotify(t, fire);
      }
      for (const n of notes) {
        const fire = getReminderFireMs(n);
        if (fire === null) continue;
        if (n.snoozeUntil && now < n.snoozeUntil) continue;
        if (now >= fire) tryNotifyNote(n, fire);
      }
    }

    function describeMeta(t) {
      const parts = [];
      if (t.dueDate) {
        parts.push(formatDateTr(t.dueDate));
        parts.push(t.dueTime || "09:00");
      }
      if (t.reminderOffset !== null && t.dueDate) {
        parts.push(REMINDER_LABELS[t.reminderOffset] || "");
      }
      if (t.repeat) parts.push(REPEAT_LABELS[t.repeat] || "");
      if (t.snoozeUntil && Date.now() < t.snoozeUntil) {
        parts.push(`ertelendi ${new Date(t.snoozeUntil).toLocaleTimeString("tr-TR", { hour: "2-digit", minute: "2-digit" })}`);
      }
      return parts.filter(Boolean);
    }

    function escapeAttr(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/</g, "&lt;");
    }

            const tm = remindDetails.querySelector(".en-time").value || null;
            const rv = remindDetails.querySelector(".en-remind").value;
            const rOff = rv === "" ? null : Number(rv);
            if (rOff !== null && !d) {
              alert("Hatırlatma için gün seçin.");
              return;
            }
            n.title = nt;
            n.body = ta.value.trim().slice(0, 50000);
            let fid = selF.value || null;
            if (fid && !folders.some((x) => x.id === fid)) fid = null;
            n.folderId = fid;
            n.dueDate = d;
            n.dueTime = tm;
            n.reminderOffset = rOff;
            n.reminderFiredFor = null;
            n.color = editColor;
            n.updatedAt = Date.now();
            editingNoteId = null;
            persist();
            renderAll();
          });
          const cancelBtn = document.createElement("button");
          cancelBtn.type = "button";
          cancelBtn.className = "btn-ghost";
          cancelBtn.textContent = "Kapat";
          cancelBtn.addEventListener("click", () => {
            editingNoteId = null;
            renderNotes();
          });
          row.append(saveBtn, cancelBtn);
          ed.append(titleIn, labF, selF, colorLabel, editColorPicker, remindDetails, ta, row);
          noteContent.appendChild(ed);
        }

        li.appendChild(noteContent);
        noteList.appendChild(li);
      }
    }

    function renderTasks() {
      const v = visibleTasks();
      taskList.innerHTML = "";
      taskEmpty.hidden = tasks.length > 0;
      updateDockBadge();
      updateTitle();

      if (tasks.length === 0) {
        taskCount.textContent = "";
        clearDone.style.visibility = "hidden";
        return;
      }
      clearDone.style.visibility = "visible";
      const active = tasks.filter((t) => !t.done).length;
      taskCount.textContent = active ? `${active} aktif` : "Tamam";

      if (v.length === 0 && tasks.length > 0) {
        const li = document.createElement("li");
        li.className = "empty";
        li.textContent = "Sonuç yok.";
        taskList.appendChild(li);
        return;
      }

      const customSort = sortByEl.value === "custom";

      for (const t of v) {
        const li = document.createElement("li");
        li.className = "task" + (t.done ? " done" : "") + (isOverdue(t) ? " overdue" : "");

        const grip = document.createElement("span");
        grip.className = "grip" + (customSort ? "" : " inactive");
        grip.textContent = "\u22EE\u22EE";
        grip.draggable = customSort;
        grip.addEventListener("dragstart", (e) => {
          if (!customSort) return;
          dragId = t.id;
          e.dataTransfer.effectAllowed = "move";
          e.dataTransfer.setData("text/plain", t.id);
        });
        grip.addEventListener("dragend", () => {
          dragId = null;
        });
        li.addEventListener("dragover", (e) => {
          if (!customSort || !dragId) return;
          e.preventDefault();
          e.dataTransfer.dropEffect = "move";
        });
        li.addEventListener("drop", (e) => {
          e.preventDefault();
          if (!customSort || !dragId) return;
          reorderFromDrag(dragId, t.id);
          dragId = null;
          renderTasks();
        });

        const main = document.createElement("label");
        main.className = "main";
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = t.done;
        cb.addEventListener("change", () => {
          const was = t.done;
          t.done = cb.checked;
          if (t.done) t.reminderFiredFor = null;
          if (t.done && !was && t.repeat) {
            tasks.push(
              normalizeTask({
                id: uid(),
                text: t.text,
                done: false,
                dueDate: nextDueDate(t.dueDate || todayISO(), t.repeat),
                dueTime: t.dueTime,
                reminderOffset: t.reminderOffset,
                reminderFiredFor: null,
                category: t.category,
                priority: t.priority,
                notes: t.notes,
                repeat: t.repeat,
                snoozeUntil: null,
              })
            );
          }
          persist();
          renderAll();
        });

        const body = document.createElement("div");
        body.className = "body";
        const title = document.createElement("div");
        title.className = "title";
        title.textContent = t.text;
        body.appendChild(title);

        const badges = document.createElement("div");
        badges.className = "badges";
        const cat = document.createElement("span");
        cat.className = "badge";
        cat.textContent = CAT_LABEL[t.category] || "Genel";
        badges.appendChild(cat);
        const pr = document.createElement("span");
        pr.className = "badge p" + t.priority;
        pr.textContent = t.priority === 1 ? "Yüksek" : t.priority === 3 ? "Düşük" : "Orta";
        badges.appendChild(pr);
        body.appendChild(badges);

        const metaParts = describeMeta(t);
        if (metaParts.length) {
          const meta = document.createElement("div");
          meta.className = "meta";
          metaParts.forEach((x) => {
            const s = document.createElement("span");
            s.textContent = x;
            meta.appendChild(s);
          });
          body.appendChild(meta);
        }
        if (t.notes && editingTaskId !== t.id) {
          const np = document.createElement("div");
          np.className = "note-preview tiny";
          np.textContent = t.notes;
          body.appendChild(np);
        }

        main.append(cb, body);

        const acts = document.createElement("div");
        acts.className = "acts";
        if (!t.done) {
          const sn15 = document.createElement("button");
          sn15.type = "button";
          sn15.textContent = "15\u2032";
          sn15.title = "15 dk ertele";
          sn15.addEventListener("click", () => {
            t.snoozeUntil = Date.now() + 15 * 60 * 1000;
            t.reminderFiredFor = null;
            persist();
            renderAll();
          });
          const sn60 = document.createElement("button");
          sn60.type = "button";
          sn60.textContent = "1s";
          sn60.title = "1 saat ertele";
          sn60.addEventListener("click", () => {
            t.snoozeUntil = Date.now() + 60 * 60 * 1000;
            t.reminderFiredFor = null;
            persist();
            renderAll();
          });
          acts.append(sn15, sn60);
        }
        const editBtn = document.createElement("button");
        editBtn.type = "button";
        editBtn.textContent = "\u22EF";
        editBtn.addEventListener("click", () => {
          editingTaskId = editingTaskId === t.id ? null : t.id;
          renderTasks();
        });
        const del = document.createElement("button");
        del.type = "button";
        del.textContent = "\u00D7";
        del.addEventListener("click", () => {
          tasks = tasks.filter((x) => x.id !== t.id);
          if (editingTaskId === t.id) editingTaskId = null;
          persist();
          renderAll();
        });
        acts.append(editBtn, del);

        li.append(grip, main, acts);
        taskList.appendChild(li);

        if (editingTaskId === t.id) {
          const panel = document.createElement("div");
          panel.className = "panel";
          const ro = t.reminderOffset == null ? "" : String(t.reminderOffset);
          panel.innerHTML = `
            <div class="grid">
              <div><label>Gün</label><input type="date" class="e-date" value="${escapeAttr(t.dueDate || "")}" /></div>
              <div><label>Saat</label><input type="time" class="e-time" value="${escapeAttr(t.dueTime || "")}" /></div>
              <div class="full"><label>Hatırlatma</label>
                <select class="e-remind">
                  <option value="">Yok</option>
                  <option value="0">Tam vakitte</option>
                  <option value="15">15 dk önce</option>
                  <option value="60">1 saat önce</option>
                  <option value="1440">1 gün önce</option>
                </select>
              </div>
              <div><label>Kategori</label>
                <select class="e-cat">
                  <option value="">Genel</option>
                  <option value="is">İş</option>
                  <option value="kisisel">Kişisel</option>
                  <option value="saglik">Sağlık</option>
                </select>
              </div>
              <div><label>Öncelik</label>
                <select class="e-pri">
                  <option value="1">Yüksek</option>
                  <option value="2">Orta</option>
                  <option value="3">Düşük</option>
                </select>
              </div>
              <div class="full"><label>Tekrar</label>
                <select class="e-rep">
                  <option value="">Yok</option>
                  <option value="daily">Her gün</option>
                  <option value="weekly">Her hafta</option>
                  <option value="monthly">Her ay</option>
                </select>
              </div>
              <div class="full"><label>Not</label><textarea class="e-notes" maxlength="2000"></textarea></div>
            </div>
            <div class="row" style="margin-top:0.35rem;margin-bottom:0">
              <button type="button" class="btn e-save">Kaydet</button>
              <button type="button" class="btn-ghost e-cancel">Vazgeç</button>
            </div>`;
          panel.querySelector(".e-remind").value = ro;
          panel.querySelector(".e-cat").value = t.category || "";
          panel.querySelector(".e-pri").value = String(t.priority);
          panel.querySelector(".e-rep").value = t.repeat || "";
          panel.querySelector(".e-notes").value = t.notes || "";

          panel.querySelector(".e-save").addEventListener("click", () => {
            t.dueDate = panel.querySelector(".e-date").value || null;
            t.dueTime = panel.querySelector(".e-time").value || null;
            const rv = panel.querySelector(".e-remind").value;
            t.reminderOffset = rv === "" ? null : Number(rv);
            t.category = panel.querySelector(".e-cat").value || "";
            t.priority = Number(panel.querySelector(".e-pri").value);
            const rp = panel.querySelector(".e-rep").value;
            t.repeat = rp || null;
            t.notes = panel.querySelector(".e-notes").value.trim().slice(0, 2000);
            t.reminderFiredFor = null;
            if (t.reminderOffset !== null && !t.dueDate) {
              alert("Hatırlatma için gün gerekli.");
              return;
            }
            editingTaskId = null;
            persist();
            renderAll();
          });
          panel.querySelector(".e-cancel").addEventListener("click", () => {
            editingTaskId = null;
            renderTasks();
          });
          li.appendChild(panel);
        }
      }
    }

    function switchView(view) {
      currentView = view;
      const notesWrap = document.querySelector(".main-content .wrap");
      if (view === "shopping") {
        notesWrap.style.display = "none";
        shopPage.classList.add("active");
        fabBtn.style.display = "none";
        shopFab.classList.add("visible");
        navShopping.classList.add("active");
        navAll.classList.remove("active");
        navFavorites.classList.remove("active");
        document.querySelector(".top-header").style.display = "none";
        renderShopping();
      } else {
        notesWrap.style.display = "";
        shopPage.classList.remove("active");
        fabBtn.style.display = "";
        shopFab.classList.remove("visible");
        navShopping.classList.remove("active");
        document.querySelector(".top-header").style.display = "";
      }
    }

    function renderShopping() {
      shopListEl.innerHTML = "";
      shopBudgetEl.value = shoppingBudget;

      let total = 0;
      for (const item of shoppingItems) {
        if (!item.checked) total += parseFloat(item.price) || 0;
      }
      shopTotalEl.textContent = total % 1 === 0 ? String(total) : total.toFixed(2);

      const budgetNum = parseFloat(shoppingBudget);
      if (budgetNum > 0 && total > budgetNum) {
        shopTotalEl.classList.add("over-budget");
      } else {
        shopTotalEl.classList.remove("over-budget");
      }

      shopEmpty.hidden = shoppingItems.length > 0;

      for (const item of shoppingItems) {
        const li = document.createElement("li");
        li.className = "shop-item" + (item.checked ? " checked" : "");

        const main = document.createElement("div");
        main.className = "shop-item-main";

        // Check button
        const check = document.createElement("button");
        check.type = "button";
        check.className = "shop-item-check" + (item.checked ? " done" : "");
        check.addEventListener("click", () => {
          item.checked = !item.checked;
          persist();
          renderShopping();
        });

        // Name input
        const name = document.createElement("input");
        name.type = "text";
        name.className = "shop-item-name";
        name.value = item.name;
        name.placeholder = "Urun adi";
        name.addEventListener("input", () => {
          item.name = name.value;
          persist();
        });

        // Price input
        const price = document.createElement("input");
        price.type = "text";
        price.className = "shop-item-price";
        price.value = item.price || "";
        price.placeholder = "0 TL";
        price.inputMode = "decimal";
        price.addEventListener("input", () => {
          item.price = price.value;
          persist();
          // Update total live
          let t = 0;
          for (const si of shoppingItems) if (!si.checked) t += parseFloat(si.price) || 0;
          shopTotalEl.textContent = t % 1 === 0 ? String(t) : t.toFixed(2);
          const b = parseFloat(shoppingBudget);
          if (b > 0 && t > b) shopTotalEl.classList.add("over-budget");
          else shopTotalEl.classList.remove("over-budget");
        });

        // Expand button
        const expand = document.createElement("button");
        expand.type = "button";
        expand.className = "shop-item-expand" + (item.expanded ? " open" : "");
        expand.textContent = "\u25B8";
        expand.addEventListener("click", () => {
          item.expanded = !item.expanded;
          persist();
          renderShopping();
        });

        // Delete button
        const del = document.createElement("button");
        del.type = "button";
        del.className = "shop-item-del";
        del.textContent = "\u00D7";
        del.addEventListener("click", () => {
          shoppingItems = shoppingItems.filter((x) => x.id !== item.id);
          persist();
          renderShopping();
        });

        main.append(check, name, price, expand, del);
        li.appendChild(main);

        // Details section
        const details = document.createElement("div");
        details.className = "shop-item-details" + (item.expanded ? " open" : "");

        const storeRow = document.createElement("div");
        storeRow.className = "shop-detail-row";
        const storeLabel = document.createElement("span");
        storeLabel.className = "shop-detail-label";
        storeLabel.textContent = "Nereden";
        const storeInput = document.createElement("input");
        storeInput.type = "text";
        storeInput.className = "shop-detail-input";
        storeInput.value = item.store || "";
        storeInput.placeholder = "Magaza / market";
        storeInput.addEventListener("input", () => {
          item.store = storeInput.value;
          persist();
        });
        storeRow.append(storeLabel, storeInput);

        const descRow = document.createElement("div");
        descRow.className = "shop-detail-row";
        const descLabel = document.createElement("span");
        descLabel.className = "shop-detail-label";
        descLabel.textContent = "Aciklama";
        const descInput = document.createElement("input");
        descInput.type = "text";
        descInput.className = "shop-detail-input";
        descInput.value = item.desc || "";
        descInput.placeholder = "Not...";
        descInput.addEventListener("input", () => {
          item.desc = descInput.value;
          persist();
        });
        descRow.append(descLabel, descInput);

        details.append(storeRow, descRow);
        li.appendChild(details);

        shopListEl.appendChild(li);
      }
    }

    function addShoppingItem() {
      shoppingItems.push({
        id: uid(),
        name: "",
        price: "",
        store: "",
        desc: "",
        checked: false,
        expanded: false
      });
      persist();
      renderShopping();
      // Focus the new item name
      setTimeout(() => {
        const inputs = shopListEl.querySelectorAll(".shop-item-name");
        if (inputs.length) inputs[inputs.length - 1].focus();
      }, 50);
    }

    function renderAll() {
      renderSidebar();
      renderNotes();
      renderTasks();
      if (currentView === "shopping") renderShopping();
    }

    noteForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const title = noteTitleInput.value.trim().slice(0, 200);
      const body = noteBody.value.trim().slice(0, 50000);
      if (!title) {
        alert("Lütfen bir başlık yazın.");
        noteTitleInput.focus();
        return;
      }
      const ro = noteReminderOffsetEl.value;
      const dueDate = noteDueDateEl.value || null;
      const dueTime = noteDueTimeEl.value || null;
      const reminderOffset = ro === "" ? null : Number(ro);
      if (reminderOffset !== null && !dueDate) {
        alert("Hatırlatma için bir gün seçin (veya hatırlatmayı Kapalı bırakın).");
        noteDueDateEl.focus();
        return;
      }
      let folderId = noteFolderSelect.value || null;
      if (folderId && !folders.some((f) => f.id === folderId)) folderId = null;
      notes.push(
        normalizeNote({
          id: uid(),
          title,
          body,
          updatedAt: Date.now(),
          pinned: false,
          folderId,
          dueDate,
          dueTime,
          reminderOffset,
          reminderFiredFor: null,
          snoozeUntil: null,
          color: selectedNoteColor,
        })
      );
      noteTitleInput.value = "";
      noteBody.value = "";
      noteDueDateEl.value = "";
      noteDueTimeEl.value = "";
      noteReminderOffsetEl.value = "";
      if (noteRemindDetails) noteRemindDetails.open = false;
      noteFolderSelect.value = "";
      selectedNoteColor = "";
      noteColorPicker.querySelectorAll(".color-dot").forEach(function(d) {
        d.classList.toggle("active", d.dataset.color === "");
      });
      persist();
      renderAll();
      closeNoteModal();
    });

    taskForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const text = taskInput.value.trim();
      if (!text) return;
      const ro = reminderOffsetEl.value;
      const task = normalizeTask({
        id: uid(),
        text,
        done: false,
        dueDate: dueDateEl.value || null,
        dueTime: dueTimeEl.value || null,
        reminderOffset: ro === "" ? null : Number(ro),
        reminderFiredFor: null,
        category: categoryEl.value || "",
        priority: Number(priorityEl.value),
        notes: taskNotesEl.value.trim().slice(0, 2000),
        repeat: repeatEl.value || null,
        snoozeUntil: null,
      });
      if (task.reminderOffset !== null && !task.dueDate) {
        alert("Hatırlatma için gün seçin.");
        dueDateEl.focus();
        return;
      }
      tasks.push(task);
      taskInput.value = "";
      dueDateEl.value = "";
      dueTimeEl.value = "";
      reminderOffsetEl.value = "";
      categoryEl.value = "";
      priorityEl.value = "2";
      repeatEl.value = "";
      taskNotesEl.value = "";
      persist();
      renderAll();
      tasksDock.open = true;
      taskInput.focus();
    });

    // Sidebar navigasyon
    function updateSidebarNav() {
      document.querySelectorAll(".sidebar-nav .nav-item").forEach(function(btn) {
        btn.classList.remove("active");
      });
      if (selectedFolderView === "all") navAll.classList.add("active");
      else if (selectedFolderView === "pinned") navFavorites.classList.add("active");
    }

    navAll.addEventListener("click", () => {
      selectedFolderView = "all";
      if (currentView !== "notes") switchView("notes");
      updateSidebarNav();
      renderAll();
    });

    navFavorites.addEventListener("click", () => {
      selectedFolderView = "pinned";
      if (currentView !== "notes") switchView("notes");
      updateSidebarNav();
      renderAll();
    });

    navFolders.addEventListener("click", () => {
      foldersExpanded = !foldersExpanded;
      folderNav.style.display = foldersExpanded ? "flex" : "none";
      navFolders.classList.toggle("active", foldersExpanded);
    });

    sidebarNewNote.addEventListener("click", () => {
      if (currentView !== "notes") switchView("notes");
      openNoteModal();
    });

    if (folderNav) {
      folderNav.addEventListener("click", (e) => {
        const navBtn = e.target.closest("button.folder-row[data-folder-view]");
        if (navBtn) {
          const view = navBtn.dataset.folderView;
          if (view === "none") {
            if (expandedFolders.has("__none")) {
              expandedFolders.delete("__none");
            } else {
              expandedFolders.add("__none");
            }
            selectedFolderView = "none";
          } else {
            selectedFolderView = view;
          }
          if (currentView !== "notes") switchView("notes");
          updateSidebarNav();
          renderAll();
        }
      });

      // "Genel" folder drop target: move notes out of folders
      const genelBtn = generalFolderWrap.querySelector("button.folder-row[data-folder-view='none']");
      if (genelBtn) {
        genelBtn.addEventListener("dragover", (e) => {
          if (!dragNoteId) return;
          e.preventDefault();
          e.dataTransfer.dropEffect = "move";
          genelBtn.classList.add("drop-target");
        });
        genelBtn.addEventListener("dragleave", () => { genelBtn.classList.remove("drop-target"); });
        genelBtn.addEventListener("drop", (e) => {
          e.preventDefault();
          genelBtn.classList.remove("drop-target");
          if (!dragNoteId) return;
          const note = notes.find((n) => n.id === dragNoteId);
          if (!note || !note.folderId) return;
          note.folderId = null;
          note.updatedAt = Date.now();
          persist();
          dragNoteId = null;
          expandedFolders.add("__none");
          renderAll();
        });
      }
    }

    addFolderBtn.addEventListener("click", () => {
      const name = newFolderName.value.trim().slice(0, 40);
      if (!name) return;
      const nf = normalizeFolder({ id: uid(), name });
      folders.push(nf);
      newFolderName.value = "";
      selectedFolderView = nf.id;
      expandedFolders.add(nf.id);
      foldersExpanded = true;
      folderNav.style.display = "flex";
      navFolders.classList.add("active");
      updateSidebarNav();
      persist();
      renderAll();
    });

    noteColorPicker.addEventListener("click", (e) => {
      const dot = e.target.closest(".color-dot");
      if (!dot) return;
      selectedNoteColor = dot.dataset.color;
      noteColorPicker.querySelectorAll(".color-dot").forEach(function(d) {
        d.classList.toggle("active", d.dataset.color === selectedNoteColor);
      });
    });

    newFolderName.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        addFolderBtn.click();
      }
    });

    clearDone.addEventListener("click", () => {
      tasks = tasks.filter((t) => !t.done);
      persist();
      renderAll();
    });

    filterPills.forEach((btn) => {
      btn.addEventListener("click", () => {
        taskFilter = btn.dataset.filter;
        filterPills.forEach((b) => b.classList.toggle("on", b === btn));
        renderTasks();
      });
    });

    [catFilter, sortByEl, taskSearch].forEach((el) => {
      el.addEventListener("input", () => renderTasks());
      el.addEventListener("change", () => renderTasks());
    });

    themeBtn.addEventListener("click", () => {
      const cur = document.documentElement.getAttribute("data-theme");
      const next = cur === "dark" ? "light" : "dark";
      localStorage.setItem(THEME_KEY, next);
      applyTheme();
    });

    if (window.matchMedia) {
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
        if (!localStorage.getItem(THEME_KEY)) applyTheme();
      });
    }

    notifBtn.addEventListener("click", async () => {
      if (!("Notification" in window)) return;
      await Notification.requestPermission();
      updateNotifBtn();
      checkReminders();
    });

    exportBtn.addEventListener("click", () => {
      const blob = new Blob(
        [JSON.stringify({ version: 5, notes, tasks, folders, shoppingItems, shoppingBudget }, null, 2)],
        { type: "application/json" }
      );
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `notlarim-${todayISO()}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
    });

    importBtn.addEventListener("click", () => importInput.click());
    importInput.addEventListener("change", () => {
      const f = importInput.files[0];
      if (!f) return;
      const r = new FileReader();
      r.onload = () => {
        try {
          const data = JSON.parse(r.result);
          if (Array.isArray(data)) {
            tasks = data.map(normalizeTask);
            folders = [];
          } else if (data.tasks && Array.isArray(data.tasks)) {
            tasks = data.tasks.map(normalizeTask);
            folders = Array.isArray(data.folders) ? data.folders.map(normalizeFolder) : [];
            notes = Array.isArray(data.notes) ? data.notes.map(normalizeNote) : [];
            shoppingItems = Array.isArray(data.shoppingItems) ? data.shoppingItems : [];
            shoppingBudget = data.shoppingBudget || "";
          } else {
            throw new Error("format");
          }
          persist();
          renderAll();
        } catch(e) {
          alert("Geçersiz dosya.");
        }
        importInput.value = "";
      };
      r.readAsText(f);
    });

    fabBtn.addEventListener("click", () => {
      if (noteModalOverlay.classList.contains("visible")) closeNoteModal();
      else openNoteModal();
    });

    noteModalClose.addEventListener("click", closeNoteModal);
    noteModalCancelBtn.addEventListener("click", closeNoteModal);

    noteModalOverlay.addEventListener("click", (e) => {
      if (e.target === noteModalOverlay) closeNoteModal();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && noteModalOverlay.classList.contains("visible")) closeNoteModal();
    });

    noteSearchEl.addEventListener("input", () => renderNotes());

    // Shopping page events
    navShopping.addEventListener("click", () => {
      if (currentView === "shopping") {
        switchView("notes");
        renderAll();
      } else {
        switchView("shopping");
      }
    });

    shopFab.addEventListener("click", addShoppingItem);

    shopBudgetEl.addEventListener("input", () => {
      shoppingBudget = shopBudgetEl.value;
      persist();
      let t = 0;
      for (const si of shoppingItems) if (!si.checked) t += parseFloat(si.price) || 0;
      const b = parseFloat(shoppingBudget);
      if (b > 0 && t > b) shopTotalEl.classList.add("over-budget");
      else shopTotalEl.classList.remove("over-budget");
    });

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") checkReminders();
    });

    setInterval(checkReminders, 30 * 1000);

    try {
      load();
      applyTheme();
      updateNotifBtn();
      renderAll();
      checkReminders();
    } catch(err) {
      document.title = "HATA: " + err.message;
      console.error(err);
    }
  </script>
  <script>
    (function () {
      if (!("serviceWorker" in navigator)) return;
      var ok =
        location.protocol === "https:" ||
        location.hostname === "localhost" ||
        location.hostname === "127.0.0.1";
      if (!ok) return;
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("./sw.js").catch(function () {});
      });
    })();
  </script>
</body>
